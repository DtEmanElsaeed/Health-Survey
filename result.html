<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition Portrait | Result</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="result">
  <div class="app-shell">
    <aside class="story-panel">
      <div>
        <div class="brand-line" id="story-brand">Atelier Nutritionnel</div>
        <h1 class="story-title" id="story-title"></h1>
        <p class="story-copy" id="story-copy"></p>
        <div class="story-metrics">
          <div class="metric-card"><div class="metric-label">Step</div><div class="metric-value" id="story-step"></div></div>
          <div class="metric-card"><div class="metric-label">Stages Left</div><div class="metric-value" id="story-left"></div></div>
          <div class="metric-card"><div class="metric-label">Mode</div><div class="metric-value" id="story-mode"></div></div>
        </div>
      </div>
      <div class="story-footer" id="story-chips"></div>
    </aside>
    <main class="page-card">
      <div class="result-panel">
        <div class="result-hero">
          <div class="card-flag" id="hero-emoji">🌿</div>
          <h2 class="page-title" id="hero-title"></h2>
          <p class="page-copy" id="hero-copy"></p>
        </div>
        <div class="summary-note" id="insight"></div>
        <div class="result-grid" id="result-grid"></div>
        <div class="btn-row">
          <button class="btn btn-secondary" type="button" id="edit-btn">Edit again</button>
          <button class="btn btn-primary" type="button" id="new-btn">Start new portrait</button>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
