<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition Portrait | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-page="login">
  <div class="app-shell">
    <main class="page-card">
      <div class="floating-ornament">🌿</div>
      <div class="center-stack">
        <div class="brand-line" id="story-brand">Atelier Nutritionnel</div>
        <div class="section-label">Entry</div>
        <h2 class="page-title" id="page-title">Begin your nutritional portrait</h2>
        <p class="page-copy" id="page-copy">Choose your language, then continue to your profile.</p>
        <div class="lang-grid">
          <button class="lang-card" type="button" data-lang="en">
            <div class="card-flag">🇬🇧</div>
            <div class="card-title" id="english-title">English</div>
            <p class="card-copy" id="english-copy">Continue in English</p>
          </button>
          <button class="lang-card" type="button" data-lang="ar">
            <div class="card-flag">🇸🇦</div>
            <div class="card-title" id="arabic-title">العربية</div>
            <p class="card-copy" id="arabic-copy">أكمل بالعربية</p>
          </button>
        </div>
        <div class="login-social">
          <div class="social-wrap">
            <div class="social-label">Google</div>
            <div id="google-btn-wrap"></div>
          </div>
          <p class="card-copy" id="guest-note">Guest mode still saves and updates by email.</p>
          <div class="btn-row">
            <button class="btn btn-primary" type="button" id="guest-btn">Continue as guest</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
