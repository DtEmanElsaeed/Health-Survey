<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition Portrait | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="profile">
  <div class="app-shell">
    <main class="page-card">
      <div class="floating-ornament">✦</div>
      <div class="brand-line" id="story-brand">Atelier Nutritionnel</div>
      <div class="section-label">Profile</div>
      <h2 class="page-title" id="page-title"></h2>
      <p class="page-copy" id="page-copy"></p>
      <form class="form-grid" id="profile-form">
        <div class="field">
          <label for="name" id="name-label">Full name</label>
          <input class="input" id="name" type="text" autocomplete="name">
        </div>
        <div class="field">
          <label for="email" id="email-label">Email</label>
          <input class="input" id="email" type="email" autocomplete="email">
        </div>
        <div class="field">
          <label for="phone" id="phone-label">Phone</label>
          <input class="input" id="phone" type="tel" autocomplete="tel">
        </div>
        <div class="form-row">
          <div class="field">
            <label for="dob" id="dob-label">Date of birth</label>
            <input class="input" id="dob" type="date" autocomplete="bday">
          </div>
          <div class="field">
            <label for="gender" id="gender-label">Gender</label>
            <select class="select" id="gender">
              <option value=""></option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Prefer not to say</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="city" id="city-label">City</label>
          <input class="input" id="city" type="text" autocomplete="address-level2">
        </div>
        <div class="error-text" id="error"></div>
        <div class="btn-row">
          <button class="btn btn-secondary" type="button" id="back-btn">Back</button>
          <button class="btn btn-primary" type="submit" id="submit-btn">Begin my portrait</button>
        </div>
      </form>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
