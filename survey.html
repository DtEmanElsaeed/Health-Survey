<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition Portrait | Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="survey">
  <div class="app-shell">
    <main class="page-card">
      <div class="floating-ornament">🌱</div>
      <div class="brand-line" id="story-brand">Atelier Nutritionnel</div>
      <div class="progress-meta">
        <span id="progress-label">1 / 1</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="question-shell">
        <div class="question-box">
          <div class="section-label">Survey</div>
          <h2 class="page-title" id="page-title"></h2>
          <p class="page-copy" id="page-copy"></p>
          <div class="notice" id="question-note" hidden></div>
        </div>
        <div id="question-body"></div>
        <div class="error-text" id="error"></div>
        <div class="btn-row">
          <button class="btn btn-secondary" type="button" id="back-btn">Back</button>
          <button class="btn btn-ghost" type="button" id="skip-btn">Skip</button>
          <button class="btn btn-primary" type="button" id="next-btn">Continue</button>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
